<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Nhóm | Realtime Chat</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="workspace-page" th:attr="data-theme=${currentTheme}">
<div class="grain"></div>
<main class="workspace-shell">
    <header class="workspace-header groups-hero">
        <div>
            <p class="muted">Công cụ nhóm</p>
            <h1>Tạo nhóm và vào nhóm</h1>
            <p class="workspace-subtitle">Trang riêng cho quản lý nhóm để giữ khu vực nhắn tin gọn gàng.</p>
        </div>
        <div class="workspace-actions">
            <a class="ghost-button" th:href="@{/chat}">Trở lại chat</a>
            <a class="ghost-button" th:href="@{/profile}">Cá nhân hóa</a>
            <a th:if="${isAdmin}" class="ghost-button" th:href="@{/admin/dashboard}">Admin</a>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="ghost-button">Đăng xuất</button>
            </form>
        </div>
    </header>

    <section class="workspace-grid groups-grid">
        <article class="workspace-card groups-actions-card">
            <h2>Thao tác nhanh</h2>
            <div class="card-actions">
                <button id="toggleCreateGroup" type="button" class="ghost-mini">Kích hoạt tạo nhóm</button>
                <button id="toggleJoinGroup" type="button" class="ghost-mini">Kích hoạt vào nhóm</button>
            </div>

            <form id="groupsCreateForm" class="inline-form hidden-panel">
                <input id="groupsNameInput" type="text" maxlength="80" placeholder="Tên nhóm">
                <label class="toggle-label">
                    <input id="groupsAutoApproveInput" type="checkbox">
                    <span>Duyệt tự động</span>
                </label>
                <button type="submit">Tạo nhóm</button>
            </form>

            <form id="groupsJoinForm" class="inline-form hidden-panel">
                <input id="groupsCodeInput" type="text" maxlength="32" placeholder="Mã nhóm">
                <button type="submit">Vào nhóm</button>
            </form>
        </article>

        <article class="workspace-card groups-list-card">
            <h2>Nhóm của bạn</h2>
            <div id="groupsList" class="stack-list"></div>
        </article>
    </section>
</main>

<script th:inline="javascript">
    window.groupsConfig = {
        currentUser: /*[[${currentUser}]]*/ '',
        isAdmin: /*[[${isAdmin}]]*/ false,
        contextPath: /*[[@{/}]]*/ '/',
        csrfHeader: /*[[${_csrf.headerName}]]*/ 'X-CSRF-TOKEN',
        csrfToken: /*[[${_csrf.token}]]*/ ''
    };
</script>
<script th:src="@{/js/groups.js}"></script>
</body>
</html>

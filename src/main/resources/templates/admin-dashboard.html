<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Quản Trị | Realtime Chat</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="admin-page" th:attr="data-theme=${currentTheme}">
<div class="grain"></div>
<main class="admin-shell">
    <header class="admin-header workspace-header">
        <div>
            <p class="muted">Cổng quản trị</p>
            <h1>Dashboard quản lý</h1>
            <p class="admin-subtitle">Tổng quan người dùng, nhóm và trạng thái hoạt động toàn hệ thống.</p>
        </div>
        <div class="admin-actions">
            <a class="ghost-button" th:href="@{/chat}">Trở lại chat</a>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="ghost-button">Đăng xuất</button>
            </form>
        </div>
    </header>

    <nav class="admin-nav workspace-card" aria-label="Điều hướng quản trị">
        <a class="nav-link" th:classappend="${currentPage == 'dashboard'} ? ' active'" th:href="@{/admin/dashboard}">Thống kê</a>
        <a class="nav-link" th:classappend="${currentPage == 'users'} ? ' active'" th:href="@{/admin/users}">Người dùng</a>
        <a class="nav-link" th:classappend="${currentPage == 'groups'} ? ' active'" th:href="@{/admin/groups}">Nhóm</a>
    </nav>

    <section class="workspace-grid admin-dashboard-grid">
        <article class="workspace-card admin-stats-card">
            <h2>Số liệu nhanh</h2>
            <div id="adminStats" class="admin-stats-grid"></div>
        </article>

        <article class="workspace-card admin-overview-card">
            <h2>Người dùng đang hoạt động</h2>
            <ul id="adminOnlineUsers" class="stack-list"></ul>
        </article>

        <article class="workspace-card admin-overview-card">
            <h2>Nhóm mới gần đây</h2>
            <ul id="adminRecentGroups" class="stack-list"></ul>
        </article>
    </section>
</main>

<script th:inline="javascript">
    window.adminDashboardConfig = {
        contextPath: /*[[@{/}]]*/ '/',
        csrfHeader: /*[[${_csrf.headerName}]]*/ 'X-CSRF-TOKEN',
        csrfToken: /*[[${_csrf.token}]]*/ ''
    };
</script>
<script th:src="@{/js/admin-dashboard.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký | Realtime Chat</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">
<div class="grain"></div>
<main class="auth-shell">
    <section class="auth-brand">
        <p class="muted">Realtime Chat</p>
        <h1>Tạo tài khoản mới trong vài giây</h1>
        <p>Thiết lập tài khoản để bắt đầu trò chuyện riêng, quản lý nhóm và cá nhân hóa giao diện.</p>
    </section>

    <section class="auth-card">
        <h2>Đăng ký</h2>
        <p class="auth-subtitle">Điền thông tin cơ bản để bắt đầu sử dụng.</p>

        <div class="notice notice-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <form th:action="@{/register}" method="post" class="auth-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <label for="username">Tên đăng nhập</label>
            <input id="username" name="username" type="text" maxlength="30" required th:value="${username}">

            <label for="password">Mật khẩu</label>
            <input id="password" name="password" type="password" minlength="6" maxlength="72" required>

            <button type="submit">Đăng ký</button>
        </form>

        <p class="auth-switch">
            Đã có tài khoản?
            <a th:href="@{/login}">Đăng nhập</a>
        </p>
    </section>
</main>
</body>
</html>

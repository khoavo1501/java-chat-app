<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cổng Quản Trị | Realtime Chat</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="admin-page" th:attr="data-theme=${currentTheme}">
<div class="grain"></div>
<main class="admin-shell">
    <header class="admin-header workspace-header">
        <div>
            <p class="muted">Cổng quản trị</p>
            <h1>Quản lý người dùng</h1>
            <p class="admin-subtitle">Duyệt vai trò, đặt lại giao diện và ép người dùng offline khi cần.</p>
        </div>
        <div class="admin-actions">
            <a class="ghost-button" th:href="@{/chat}">Trở lại chat</a>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="ghost-button">Đăng xuất</button>
            </form>
        </div>
    </header>

    <section class="admin-panel workspace-card">
        <div class="admin-toolbar">
            <input id="adminSearch" class="sidebar-input" type="search" placeholder="Tìm người dùng...">
            <span class="admin-note">Chỉ người có vai trò ADMIN mới truy cập được trang này.</span>
        </div>
        <div id="adminUsers" class="admin-grid"></div>
    </section>
</main>

<script th:inline="javascript">
    window.adminConfig = {
        contextPath: /*[[@{/}]]*/ '/',
        csrfHeader: /*[[${_csrf.headerName}]]*/ 'X-CSRF-TOKEN',
        csrfToken: /*[[${_csrf.token}]]*/ ''
    };
</script>
<script th:src="@{/js/admin.js}"></script>
</body>
</html>

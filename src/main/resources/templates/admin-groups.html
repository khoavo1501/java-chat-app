<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Nhóm | Realtime Chat</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="admin-page" th:attr="data-theme=${currentTheme}">
<div class="grain"></div>
<main class="admin-shell">
    <header class="admin-header workspace-header">
        <div>
            <p class="muted">Cổng quản trị</p>
            <h1>Quản lý nhóm</h1>
            <p class="admin-subtitle">Theo dõi nhóm, bật/tắt tự động duyệt và xóa nhóm khi cần.</p>
        </div>
        <div class="admin-actions">
            <a class="ghost-button" th:href="@{/chat}">Trở lại chat</a>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="ghost-button">Đăng xuất</button>
            </form>
        </div>
    </header>

    <nav class="admin-nav workspace-card" aria-label="Điều hướng quản trị">
        <a class="nav-link" th:classappend="${currentPage == 'dashboard'} ? ' active'" th:href="@{/admin/dashboard}">Thống kê</a>
        <a class="nav-link" th:classappend="${currentPage == 'users'} ? ' active'" th:href="@{/admin/users}">Người dùng</a>
        <a class="nav-link" th:classappend="${currentPage == 'groups'} ? ' active'" th:href="@{/admin/groups}">Nhóm</a>
    </nav>

    <section class="admin-panel workspace-card">
        <div class="admin-toolbar">
            <input id="adminGroupSearch" class="sidebar-input" type="search" placeholder="Tìm theo tên nhóm hoặc mã nhóm...">
            <span class="admin-note">Trang này chỉ dành cho người quản trị hệ thống.</span>
        </div>
        <div id="adminGroups" class="admin-grid"></div>
    </section>
</main>

<script th:inline="javascript">
    window.adminGroupsConfig = {
        contextPath: /*[[@{/}]]*/ '/',
        csrfHeader: /*[[${_csrf.headerName}]]*/ 'X-CSRF-TOKEN',
        csrfToken: /*[[${_csrf.token}]]*/ ''
    };
</script>
<script th:src="@{/js/admin-groups.js}"></script>
</body>
</html>

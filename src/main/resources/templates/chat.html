<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="chat-page">
<div class="app-shell">
    <aside class="sidebar">
        <header class="sidebar-header">
            <div>
                <p class="muted">Dang nhap boi</p>
                <p class="current-user" id="currentUser" th:text="${currentUser}"></p>
            </div>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="ghost-button">Dang xuat</button>
            </form>
        </header>

        <div class="sidebar-section">
            <h2>Danh sach nguoi dung</h2>
            <ul id="userList" class="user-list"></ul>
        </div>
    </aside>

    <section class="chat-panel">
        <header class="chat-header">
            <div>
                <p class="muted">Dang tro chuyen voi</p>
                <h2 id="activePeer">Chon mot nguoi dung de bat dau</h2>
            </div>
            <span id="peerStatus" class="badge">Offline</span>
        </header>

        <main id="messages" class="messages"></main>

        <form id="messageForm" class="message-form" autocomplete="off">
            <input id="messageInput" type="text" maxlength="1000" placeholder="Nhap tin nhan..." required>
            <button type="submit">Gui</button>
        </form>
    </section>
</div>

<script th:inline="javascript">
    window.chatConfig = {
        currentUser: /*[[${currentUser}]]*/ '',
        contextPath: /*[[@{/}]]*/ '/',
        wsEndpoint: /*[[@{/ws}]]*/ '/ws'
    };
</script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script th:src="@{/js/chat.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dang ky | Realtime Chat</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">
<div class="grain"></div>
<main class="auth-card">
    <h1>Tao tai khoan</h1>
    <p class="auth-subtitle">Dang ky username va password de su dung he thong</p>

    <div class="notice notice-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <form th:action="@{/register}" method="post" class="auth-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <label for="username">Username</label>
        <input id="username" name="username" type="text" maxlength="30" required th:value="${username}">

        <label for="password">Password</label>
        <input id="password" name="password" type="password" minlength="6" maxlength="72" required>

        <button type="submit">Dang ky</button>
    </form>

    <p class="auth-switch">
        Da co tai khoan?
        <a th:href="@{/login}">Dang nhap</a>
    </p>
</main>
</body>
</html>
